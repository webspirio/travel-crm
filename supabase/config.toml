# AnyTour CRM — local development Supabase config.
# Production runs on self-hosted Supabase on Hostinger KVM2 with its own config.
# This file is for `supabase start` inside the devcontainer only.

project_id = "anytour-crm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Vite serves under /travel-crm/ (see vite.config.ts base).
site_url = "http://localhost:5174/travel-crm/"
additional_redirect_urls = ["http://localhost:5174/travel-crm/"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Owner-invite-only model — matches PROPOSAL.md §6 and SUPABASE-PLAN.md:160.
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
# Enables the email/password provider itself. Despite the name, the
# Supabase CLI maps this to GOTRUE_EXTERNAL_EMAIL_ENABLED — false here
# disables ALL email-based auth (sign-in, not just sign-up). The
# invite-only model is enforced by [auth] enable_signup = false above
# (which becomes GOTRUE_DISABLE_SIGNUP=true).
enable_signup = true
double_confirm_changes = true
# Disabled in dev — use Inbucket at http://localhost:54324 to read magic links.
# Production overrides this to true.
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Google OAuth deferred — production-only. Local dev uses email + password.
# [auth.external.google]
# enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
